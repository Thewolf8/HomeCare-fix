name: Android APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor Android and Sync
        run: |
          npm install @capacitor/android
          npx @capacitor/cli add android || true
          npx @capacitor/cli sync android

      # ✨ الخطوة الجديدة: توليد أيقونات التطبيق تلقائياً من المجلد assets/icon.png لـ Android
      - name: Generate App Icons from Assets
        run: |
          npm install @capacitor/assets
          npx @capacitor/assets generate --android

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # خطوة حل تضارب إصدارات كوتلن
      - name: Fix Kotlin Duplicate Classes Conflict
        run: |
          echo "" >> android/app/build.gradle
          echo "configurations.all {" >> android/app/build.gradle
          echo "    resolutionStrategy {" >> android/app/build.gradle
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'" >> android/app/build.gradle
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'" >> android/app/build.gradle
          echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'" >> android/app/build.gradle
          echo "    }" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle

      - name: Grant execute permission for Gradle
        run: chmod +x android/gradlew

      - name: Build APK with Gradle
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: homecare-cabinet-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Release APK (unsigned)
        run: cd android && ./gradlew assembleRelease

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: homecare-cabinet-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
